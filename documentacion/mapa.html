<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta charset="utf-8"/>
<title>Editor de Mapa RPG</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>body {
    margin:0;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    height:100vh;
}

#map {
    flex:1;
}

.panel {
    background:#222;
    color:white;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:10px;
}

button, select, input {
    padding:10px;
    font-size:16px;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
    <input type="text" id="rutaNombre" placeholder="Nombre de la ruta">
    <button onclick="crearRuta()">Crear Ruta</button>

    <select id="selectorRuta" onchange="cambiarRuta()"></select>

    <button onclick="borrarRuta()">Borrar Ruta</button>
    <button onclick="exportarRuta()">Exportar</button>
    <input type="file" onchange="importarRuta(event)">
</div>

<script>
var map = L.map('map', { 
    crs: L.CRS.Simple,
    tap: true,
    touchZoom: true
});
var bounds = [[0,0], [1000,1000]];
L.imageOverlay('mapa.png', bounds).addTo(map);
map.fitBounds(bounds);

var rutas = JSON.parse(localStorage.getItem("rutas")) || {};
var rutaActual = null;
var markers = [];
var polyline;

// ---------- GUARDAR ----------
function guardar() {
    localStorage.setItem("rutas", JSON.stringify(rutas));
}

// ---------- REDIBUJAR ----------
function redibujar() {

    if (polyline) map.removeLayer(polyline);
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    if (!rutaActual) return;

    var puntos = rutas[rutaActual];

    puntos.forEach((p, index) => {

        var marker = L.marker(p, { draggable:true }).addTo(map);

        marker.index = index;

        let lastTap = 0;

        marker.on('click', function(e) {
        
            const now = new Date().getTime();
            const tapLength = now - lastTap;
        
            if (tapLength < 300 && tapLength > 0) {
                puntos.splice(marker.index,1);
                guardar();
                redibujar();
            }
        
            lastTap = now;
        });

        marker.on('dragend', function(e){
            puntos[marker.index] = [
                e.target.getLatLng().lat,
                e.target.getLatLng().lng
            ];
            guardar();
            redibujar();
        });

        markers.push(marker);
    });

    if (puntos.length > 1) {
        polyline = L.polyline(puntos).addTo(map);
    }
}

// ---------- CREAR RUTA ----------
function crearRuta() {

    var nombre = document.getElementById("rutaNombre").value.trim();
    if (!nombre) return;

    if (!rutas[nombre]) {
        rutas[nombre] = [];
    }

    rutaActual = nombre;
    actualizarSelector();
    guardar();
    redibujar();
}

// ---------- CAMBIAR RUTA ----------
function cambiarRuta() {
    rutaActual = document.getElementById("selectorRuta").value;
    redibujar();
}

// ---------- BORRAR RUTA ----------
function borrarRuta() {
    if (!rutaActual) return;

    delete rutas[rutaActual];
    rutaActual = null;
    actualizarSelector();
    guardar();
    redibujar();
}

// ---------- ACTUALIZAR SELECTOR ----------
function actualizarSelector() {
    var selector = document.getElementById("selectorRuta");
    selector.innerHTML = "";

    Object.keys(rutas).forEach(nombre => {
        var option = document.createElement("option");
        option.value = nombre;
        option.text = nombre;
        selector.appendChild(option);
    });

    if (rutaActual) selector.value = rutaActual;
}

// ---------- EXPORTAR ----------
function exportarRuta() {

    if (!rutaActual) return;

    var dataStr = "data:text/json;charset=utf-8," + 
        encodeURIComponent(JSON.stringify(rutas[rutaActual]));

    var dl = document.createElement('a');
    dl.setAttribute("href", dataStr);
    dl.setAttribute("download", rutaActual + ".json");
    dl.click();
}

// ---------- IMPORTAR ----------
function importarRuta(event) {

    var file = event.target.files[0];
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function(e) {

        var contenido = JSON.parse(e.target.result);
        var nombre = file.name.replace(".json","");

        rutas[nombre] = contenido;
        rutaActual = nombre;

        actualizarSelector();
        guardar();
        redibujar();
    };

    reader.readAsText(file);
}

// ---------- CLICK MAPA ----------
map.on('click', function(e) {

    if (!rutaActual) return;

    rutas[rutaActual].push([e.latlng.lat, e.latlng.lng]);
    guardar();
    redibujar();
});

// ---------- INICIALIZAR ----------
actualizarSelector();

</script>

</body>
</html>
